<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/vue@next"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; transition: background-color 0.5s, color 0.5s; }
        .dark-mode { background-color: #121212; color: #ffffff; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px 20px; cursor: pointer; }
        button.toggle { margin-left: 20px; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <header>
            <h1>Student Management System</h1>
            <button class="toggle" @click="toggleDarkMode">Toggle Dark Mode</button>
        </header>
        <main>
            <div id="student-list"></div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        const app = createApp({
            data() {
                return { darkMode: false };
            },
            methods: {
                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    document.body.classList.toggle('dark-mode', this.darkMode);
                }
            }
        });

        app.mount('#app');

        const root = document.getElementById('student-list');
        const StudentList = () => {
            return React.createElement('div', null, 'Here will be the list of students');
        };

        ReactDOM.render(React.createElement(StudentList), root);
    </script>
</body>
</html>
